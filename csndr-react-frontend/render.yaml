services:
  # Service pour la base de données PostgreSQL
  - type: psql
    name: csndr-database
    plan: free
    ipAllowList: [] # Autorise l'accès depuis les services Render

  # Service web pour le backend Laravel
  - type: web
    name: csndr-backend
    runtime: php
    plan: free
    rootDir: csndr-react-frontend/csndr-laravel-backend
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: php artisan serve --host 0.0.0.0 --port 10000
    envVars:
      - key: APP_URL
        value: https://csndr-backend.onrender.com # Remplace par l'URL de ton service backend
      - key: DATABASE_URL
        fromDatabase:
          name: csndr-database
          property: connectionString
      - key: APP_KEY
        sync: false # À ajouter manuellement dans le dashboard
      - key: SANCTUM_STATEFUL_DOMAINS
        sync: false # À ajouter manuellement dans le dashboard
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
